name: Deploy · labor-rates Lambda

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION:  us-east-1
  ECR_REPO:    govhub/lambda-labor-rates
  LAMBDA_NAME: govhub-labor-rates

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:     ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPO

          docker build --platform linux/amd64 --provenance=false \
            -t $IMAGE_URI:$IMAGE_TAG -t $IMAGE_URI:latest \
            labor_rates/

          docker push $IMAGE_URI:$IMAGE_TAG
          docker push $IMAGE_URI:latest

          echo "IMAGE_URI=$IMAGE_URI:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update Lambda to use new image
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_NAME }} \
            --image-uri ${{ env.IMAGE_URI }}

          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_NAME }}

      - name: Update Lambda environment variables
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ env.LAMBDA_NAME }} \
            --environment "Variables={DATABASE_URL=${{ secrets.DATABASE_URL }},GSA_CALC_API_KEY=${{ secrets.GSA_CALC_API_KEY }}}"